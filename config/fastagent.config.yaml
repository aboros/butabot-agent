# MCP Servers Configuration
# Each server entry follows the fast-agent MCP server configuration format
# Secrets can be kept in fastagent.secrets.yaml using ${VAR_NAME} syntax
mcp:
  servers: {}  # Empty dictionary - add servers here as needed
  
  # Example: STDIO Server (filesystem)
  filesystem:
    command: "npx"
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/app/data"  # Working directory for the filesystem server
    env: {}
  
  # Example: STDIO Server with environment variables
  # brave_search:
  #   command: "npx"
  #   args:
  #     - "-y"
  #     - "@modelcontextprotocol/server-brave-search"
  #   env:
  #     BRAVE_API_KEY: "${BRAVE_API_KEY}"  # Set in fastagent.secrets.yaml
  
  # Example: HTTP Server
  # remote_server:
  #   transport: "http"
  #   url: "http://localhost:8000/mcp"
  #   headers:
  #     Authorization: "Bearer ${REMOTE_API_KEY}"  # Set in fastagent.secrets.yaml
  #   # Optional: timeout for SSE sessions
  #   read_transport_sse_timeout_seconds: 300
  
  # Example: SSE Server
  # sse_server:
  #   transport: "sse"
  #   url: "http://localhost:8001/sse"
  
  # Example: HuggingFace MCP Server (HF_TOKEN automatically applied)
  # huggingface:
  #   transport: "http"
  #   url: "https://huggingface.co/mcp"
  #   # HF_TOKEN from environment automatically applied!
  
  # Example: Server with implementation spoofing (for testing)
  # test_server:
  #   transport: "http"
  #   url: "http://localhost:8000/mcp"
  #   implementation:
  #     name: "claude-code"
  #     version: "1.0.99"
  
  # Example: Server with MCP Roots
  # data_server:
  #   transport: "http"
  #   url: "http://localhost:8000/mcp"
  #   roots:
  #     uri: "file:///app/data"
  #     name: "Data Directory"
  #     server_uri_alias: "/mnt/data"  # Optional: present consistent path to server
  
  # Example: Server with Sampling
  # sampling_server:
  #   transport: "http"
  #   url: "http://localhost:8000/mcp"
  #   sampling:
  #     model: "anthropic.claude-sonnet-4-5"  # Model for sampling requests
  
  # Example: Server with Elicitation configuration
  # elicitation_server:
  #   transport: "http"
  #   url: "http://localhost:8000/mcp"
  #   elicitation:
  #     mode: "forms"  # "forms" (default), "auto_cancel", or "none"
  
  # Example: Server with OAuth authentication
  # oauth_server:
  #   transport: "http"
  #   url: "https://example-server.modelcontextprotocol.io/mcp"
  #   auth:
  #     oauth: true  # Default true for HTTP/SSE
  #     persist: "keyring"  # "keyring" (default) or "memory"
  #     redirect_port: 3030  # Default
  #     redirect_path: "/callback"  # Default
  #     # scope: "user"  # Optional, server defaults used if omitted
