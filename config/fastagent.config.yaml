# Fast Agent Configuration
# This file configures the fast-agent-mcp framework integration
# Fast-agent automatically loads this file from the project root
# Secrets should be kept in fastagent.secrets.yaml (gitignored)

# Default model for all agents (can be overridden per agent)
# Model precedence: agent decorator > command line > this default > FAST_AGENT_MODEL env var > system default (gpt-5-mini.low)
default_model: "anthropic.claude-sonnet-4-5"  # or use aliases like "sonnet", "haiku", "gpt-4o", etc.

