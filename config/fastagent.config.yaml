# Logging Configuration
# Controls the verbosity and display of fast-agent output
logger:
  type: "console"  # "none", "console", "file", or "http"
  level: "info"  # "debug", "info", "warning", or "error"
  progress_display: false  # Disable progress display
  show_chat: false  # Chat messages on console
  show_tools: true  # MCP Server tool calls on console
  truncate_tools: true  # Truncate long tool calls in display
  enable_markup: true  # Enable rich library markup
  # streaming: "none"  # "markdown", "plain", or "none" - set to "none" to disable streaming output

# MCP UI Configuration
mcp_ui_output_dir: ".fast-agent/ui"  # Where to write MCP-UI HTML files
mcp_ui_mode: "enabled"  # "disabled", "enabled", or "auto" to automatically open links

