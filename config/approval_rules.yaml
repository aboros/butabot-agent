# Tool Approval Rules Configuration
# Maps tool names to whether approval is required (true) or not (false)
# 
# Rules:
#   - true: Tool requires user approval before execution
#   - false: Tool can be executed automatically without approval
#
# Default behavior: If a tool is not listed, it requires approval (safe default)

