services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: butabot-agent
    network_mode: host
    env_file:
      - .env
    volumes:
      # Mount data directory (read-write) - Agent's working directory (cwd)
      # You can mount any folder from host to /app/data or mount additional folders anywhere
      - ./data:/app/data:rw
      
      # Mount Drupal site or any other folders for agent access
      # Option 1: Mount entire docroot directly as data directory
      # - /path/to/drupal/docroot:/app/data:rw
      
      # Option 2: Mount docroot as subdirectory (recommended - more flexible)
      # - /path/to/drupal/docroot:/app/data/drupal:rw
      
      # Option 3: Mount specific folders (most secure)
      # - /path/to/drupal/docroot/modules/custom:/app/data/drupal/modules/custom:rw
      # - /path/to/drupal/docroot/themes/custom:/app/data/drupal/themes/custom:rw
      # - /path/to/drupal/docroot/sites/default:/app/data/drupal/sites/default:rw
      
      # Optional: Mount CLAUDE.md for project-specific guidance
      # - /path/to/drupal/CLAUDE.md:/app/data/CLAUDE.md:ro
      
      # You can mount ANY folder from host anywhere in container:
      # - /any/path/on/host:/app/data/anywhere:rw
      
      # Mount configuration files (read-only)
      # Fast-agent expects config files in root, so mount them from config/ directory
      # Note: Create config/fastagent.secrets.yaml from config/fastagent.secrets.yaml.example if it doesn't exist
      - ./config/fastagent.config.yaml:/app/fastagent.config.yaml:ro
      - ./config/fastagent.secrets.yaml:/app/fastagent.secrets.yaml:ro
      - ./factoids.json:/app/factoids.json:ro
      - ./requirements.txt:/app/requirements.txt:ro
      
      # Mount Python code for development (changes reflected immediately)
      - ./agent:/app/agent:ro
      - ./approval:/app/approval:ro
      - ./config:/app/config:ro
      - ./connectors:/app/connectors:ro
      - ./core:/app/core:ro
      - ./bot:/app/bot:ro
      - ./mcp_nano_banana:/app/mcp_nano_banana:ro
      - ./app_multi_platform.py:/app/app_multi_platform.py:ro
      - ./test_agent.py:/app/test_agent.py:ro
      
      # Mount Docker socket so bot can run Docker commands for STDIO MCP servers
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*app_multi_platform"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

