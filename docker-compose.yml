services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: butabot-agent
    network_mode: host
    env_file:
      - .env
    volumes:
      # .mcp.json is copied into image during build (not mounted)
      # Mount data directory (read-write) - Agent's working directory
      # Agent's cwd is restricted to /app/data
      # You can mount any folder from host to /app/data or mount additional folders anywhere
      - ./data:/app/data:rw
      
      # Mount Drupal site or any other folders for agent access
      # Option 1: Mount entire docroot directly as data directory
      # - /path/to/drupal/docroot:/app/data:rw
      
      # Option 2: Mount docroot as subdirectory (recommended - more flexible)
      # - /path/to/drupal/docroot:/app/data/drupal:rw
      
      # Option 3: Mount specific folders (most secure)
      # - /path/to/drupal/docroot/modules/custom:/app/data/drupal/modules/custom:rw
      # - /path/to/drupal/docroot/themes/custom:/app/data/drupal/themes/custom:rw
      # - /path/to/drupal/docroot/sites/default:/app/data/drupal/sites/default:rw
      
      # Optional: Mount CLAUDE.md for project-specific guidance
      # - /path/to/drupal/CLAUDE.md:/app/data/CLAUDE.md:ro
      
      # You can mount ANY folder from host anywhere in container:
      # - /any/path/on/host:/app/data/anywhere:rw
      
      # Mount Python code for development (changes reflected immediately)
      - ./bot:/app/bot:ro
      - ./main.py:/app/main.py:ro
      
      # Mount Docker socket so bot can run Docker commands for STDIO MCP servers
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*bot.app"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

