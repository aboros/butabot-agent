services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: butabot-agent
    network_mode: host
    env_file:
      - .env
    volumes:
      # Mount .mcp.json from project root (SDK auto-discovers this)
      - ./.mcp.json:/app/.mcp.json:ro
      # Mount config directory for easy MCP config updates
      - ./config:/app/config:ro
      # Mount data directory to persist files created by MCP tools (like filesystem server)
      - ./data:/app/data:rw
      # Mount Python code for development (changes reflected immediately)
      - ./bot:/app/bot:ro
      - ./main.py:/app/main.py:ro
      # Mount Docker socket so bot can run Docker commands for STDIO MCP servers
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*bot.app"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

