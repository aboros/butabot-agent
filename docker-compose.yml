services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: butabot-agent
    network_mode: host
    env_file:
      - .env
    environment:
      # Host path for the mount comes from .env; inside the container the workspace is always /data
      AGENT_DATA_DIR: /data
    volumes:
      # Agent working directory — mount any folders you want the agent to access
      - ${AGENT_DATA_DIR}:/data:rw

      # Examples:
      # - /path/to/project:/data/project:rw
      # - /path/to/project:/data/project:ro   # read-only

      # Mount configuration files (read-only)
      - ./.mcp.json:/app/.mcp.json:ro
      - ./requirements.txt:/app/requirements.txt:ro

      # Mount Python code for development (changes reflected without rebuild)
      - ./bot:/app/bot:ro

      # Mount Docker socket so the bot can run Docker-based MCP servers
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "python.*bot.app"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
